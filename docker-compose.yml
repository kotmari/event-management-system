version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mydb
      - PORT=5001
    depends_on:
      - db
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"